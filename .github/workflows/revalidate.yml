name: Revalidate site cache

on:
  issues:
    types: [labeled]

jobs:
  revalidate:
    if: github.event.label.name == 'deployed'
    runs-on: ubuntu-latest

    steps:
      - name: Revalidate site cache
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "Authorization: Bearer ${{ secrets.REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "Revalidation failed"

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Site cache revalidated. ✅'
            });
