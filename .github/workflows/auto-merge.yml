# Copy this file to your GZWItems-List repo at:
# .github/workflows/auto-merge.yml
#
# When you add the "approved" label to an issue, this action:
# 1. Extracts the JSON code block from the issue body
# 2. Merges it into price-overrides.json
# 3. Commits and pushes the change
# 4. Closes the issue with a comment

name: Auto-merge approved contributions

on:
  issues:
    types: [labeled]

jobs:
  merge-contribution:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Random delay to stagger parallel runs
        run: sleep $((RANDOM % 30))

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract JSON from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Extract JSON from the code block
            const match = body.match(/```json\n([\s\S]*?)\n```/);
            if (!match) {
              core.setFailed('No JSON code block found in issue body.');
              return;
            }

            // Validate JSON
            try {
              JSON.parse(match[1]);
            } catch (e) {
              core.setFailed(`Invalid JSON in issue: ${e.message}`);
              return;
            }

            core.setOutput('json', match[1]);

            const itemName = issue.title.replace(/^\[Contribution\]\s*/, '').split('—')[0].trim();
            core.setOutput('item_name', itemName);
            core.setOutput('issue_number', issue.number);

      - name: Merge, commit and push
        uses: actions/github-script@v7
        env:
          SUBMITTED_JSON: ${{ steps.extract.outputs.json }}
          ITEM_NAME: ${{ steps.extract.outputs.item_name }}
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const submitted = JSON.parse(process.env.SUBMITTED_JSON);
            const filePath = 'price-overrides.json';
            const maxAttempts = 10;

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              // Pull latest
              execSync('git pull --rebase origin master');

              // Read current file (may have been updated by another run)
              let overrides = {};
              if (fs.existsSync(filePath)) {
                overrides = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              }

              // Merge submitted data
              for (const [itemId, fields] of Object.entries(submitted)) {
                if (!overrides[itemId]) overrides[itemId] = {};
                Object.assign(overrides[itemId], fields);
              }

              // Write sorted
              const sorted = Object.keys(overrides).sort().reduce((acc, key) => {
                acc[key] = overrides[key];
                return acc;
              }, {});
              fs.writeFileSync(filePath, JSON.stringify(sorted, null, 2) + '\n');

              // Stage and check for changes
              execSync('git add price-overrides.json');
              try {
                execSync('git diff --cached --quiet');
                console.log('No changes to commit');
                return;
              } catch (_) {
                // There are changes to commit
              }

              execSync(`git commit -m "Update ${process.env.ITEM_NAME} from contribution #${process.env.ISSUE_NUMBER}"`);

              try {
                execSync('git push');
                console.log('Pushed successfully');
                return;
              } catch (e) {
                console.log(`Push failed (attempt ${attempt}), retrying...`);
                execSync('git reset HEAD~1');
                execSync('git checkout -- price-overrides.json');
                const delay = attempt * 2000 + Math.random() * 3000;
                await new Promise(r => setTimeout(r, delay));
              }
            }

            core.setFailed('Failed after 5 attempts');

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Merged into \`price-overrides.json\` and committed. Thanks for contributing! 🎉`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });

      - name: Revalidate site cache
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "Authorization: Bearer ${{ secrets.REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "Revalidation skipped (site may not be configured yet)"
