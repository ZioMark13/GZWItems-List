name: Validate JSON

on:
  pull_request:
    paths:
      - "price-overrides.json"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Checking JSON validity..."

          if ! jq empty price-overrides.json; then
            echo "❌ Invalid JSON format"
            exit 1
          fi

          echo "✅ JSON is valid"